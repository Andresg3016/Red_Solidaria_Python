<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Solidaria</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<style>
    body{
    margin: 0;
    padding: 0;
    font-family: "Nunito", sans-serif;
    background: linear-gradient(150deg, rgb(0, 112, 211), rgb(78, 220, 123));
    height: 100vh;
}
.formulario{
    position:absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    background: white;
    border-radius: 10px;
}
.formulario h1{
    text-align: center;
    padding: 20px 0 20px 0;
    border-bottom: 1px solid silver;
}

.formulario form{
    padding: 0 40px;
    box-sizing: border-box;
}
form .email{
    position: relative;
    border-bottom: 2px solid #adadad;
    margin: 30px 0;
}
.email input{
    width: 100%;
    padding: 0 5px;
    height: 40px;
    font-size: 20px;
    border: none;
    background: none;
    outline: none;
}


input[type="submit"]{
    width: 100%;
    height: 50px;
    border: 1px solid;
    background-color: rgb(78, 220, 123);
    border-radius: 25px;
    font-size: 18px;
    color:white;
    cursor: pointer;
    outline: none;
}
input[type="submit"]:hover{
    border-color: rgb(0, 112, 211);
    transition: .5s;
}

.registrarse{
    margin: 30px 0;
    text-align: center;
    font-size: 16px;
    color: black;
}

.registrarse a{
    color:  rgb(78, 220, 123);
    text-decoration: none;
}

.registrarse a:hover{
    text-decoration: underline;
}
</style>
<body>
<header class="header">
      <div class="logo">
        <a href="index.html"><img src="img/Logo.jpeg" alt="Logo Red Solidaria" /></a>
      </div>

      <input type="checkbox" id="menu-toggle" />

      <label for="menu-toggle" class="menu-icon">☰</label>

      <nav class="nav">
        <ul class="nav-links">
          <li><a href="#">¡Dona Ahora!</a></li>
          <li><a href="#">Projects</a></li>
          <li><a href="#">About us</a></li>
          <li class="mobile-btn">
            <a href="iniciodesesion.html" class="btn-link">Iniciar Sesión</a>
          </li>
        </ul>
      </nav>

</header>
    <div class="formulario">
        <h1>Inicio de Sesión</h1>
        <form method="post">
            <div class="email">
                <input type="text" placeholder="Correo electrónico" required>
                
            </div>
            <div class="email">
                <input type="password" placeholder="Contraseña" required>
                
            </div>
            <!--Opcional el recuperar contraseña-->
            <div class="recordar"></div>
            <input type="submit" value="Iniciar">
            <div class="registrarse">
                Quiero hacer el <a href="#">registro</a>
            </div>
        </form>
    </div>
</body>
</html>
